name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish-recollect-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Publish to PyPI (Trusted Publishing / OIDC preferred)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # If OIDC/Trusted Publisher is not configured on PyPI for this repo,
          # provide a fallback token secret (create at https://pypi.org/manage/account/token/)
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-llama-index-memory-recollect:
    needs: publish-recollect-ai
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: packages/llama-index-memory-recollect
      - name: Publish to PyPI (Trusted Publishing / OIDC preferred)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/llama-index-memory-recollect/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}