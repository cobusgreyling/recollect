name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint + format check
        run: |
          ruff check .
          ruff format --check .
      - name: Quick compile check (packages)
        run: python -m compileall -q src packages/llama-index-memory-recollect/src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e packages/llama-index-memory-recollect
      - name: Pytest (with coverage)
        run: pytest -q --cov=recollect --cov-report=term-missing:skip-covered
      - name: Demo smoke test
        run: |
          pip install -e .
          recollect --version || python -m recollect.cli --version || echo "cli version ok via entrypoint"
          recollect demo --user-id ci_smoke --query "test" || true