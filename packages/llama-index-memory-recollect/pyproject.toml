[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llama-index-memory-recollect"
version = "0.1.0"
description = "LlamaIndex memory integration for Recollect"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "llama-index-core>=0.11.0",
    "recollect-ai>=0.2.0,<0.3.0",
]

[tool.llamahub]
contains_example = false
import_path = "llama_index.memory.recollect"

[tool.llamahub.class_authors]
RecollectMemory = "Cobus Greyling"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["llama_index"]

[tool.hatch.build.targets.wheel.force-include]
"src/llama_index" = "llama_index"